<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>PWA 自動通知テスト</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f0f2f5; }
    .card { background: white; padding: 30px; border-radius: 12px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button { background: #007aff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>PWA 自動通知アプリ</h2>
    <p>まずは下のボタンを押して通知を許可してください。</p>
    <button id="auth-btn">通知を許可する</button>
    <p id="status" style="margin-top:20px; color:#666; font-size:14px; word-break:break-all;"></p>
  </div>

  <script>
    const authBtn = document.getElementById('auth-btn');
    const statusDiv = document.getElementById('status');

    // Service Workerの登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    authBtn.addEventListener('click', async () => {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        statusDiv.innerText = '通知許可OK！宛先をサーバーに登録中...';
        
        const reg = await navigator.serviceWorker.ready;
        // Firebase等で発行した公開鍵（VAPIDキー）をここに入れます
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: 'YOUR_PUBLIC_VAPID_KEY' 
        });

        // サーバー（API）にあなたのiPhoneの宛先トークンを送りつける
        await fetch('/api/send-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subscription: sub, registerOnly: true })
        });

        statusDiv.innerHTML = '<b>登録完了！</b><br>これでサーバーからいつでもこのiPhoneに通知を飛ばせます。';
      } else {
        statusDiv.innerText = '通知が拒否されました。';
      }
    });
  </script>
</body>
</html>
