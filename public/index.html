<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>PWA シンプル通知テスト</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f0f2f5; }
    .card { background: white; padding: 30px; border-radius: 12px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button { background: #007aff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    button:disabled { background: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <h2>PWA シンプル通知アプリ</h2>
    <p>ボタンを押して通知を許可してください。</p>
    <button id="auth-btn">通知を許可する</button>
    <p id="status" style="margin-top:20px; color:#666; font-size:14px; word-break:break-all; text-align: left;"></p>
  </div>

  <script>
    const authBtn = document.getElementById('auth-btn');
    const statusDiv = document.getElementById('status');

    // 1. Service Workerの登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker 登録完了'))
        .catch(err => console.error('Service Worker 登録失敗:', err));
    }

    // 2. ボタンを押したときの処理
    authBtn.addEventListener('click', async () => {
      statusDiv.innerHTML = '通知の許可を確認中...';
      
      try {
        // ブラウザに通知許可を求める
        const permission = await Notification.requestPermission();
        
        if (permission === 'granted') {
          statusDiv.innerHTML = '通知許可OK！宛先（Subscription）を生成中...';
          
          // Service Workerの準備ができるのを待つ
          const reg = await navigator.serviceWorker.ready;
          
          if (!reg.pushManager) {
            throw new Error('このブラウザ/環境は PushManager（Webプッシュ通知機能）に対応していません。iPhoneの場合は必ず「ホーム画面に追加」してから起動してください。');
          }

          // ⚠️ 注目：ここにPythonのa.pyで出力された「公開鍵（Public Keyの1行）」を貼り付けます
          // index.html側も同じ鍵にする
const PUBLIC_VAPID_KEY = 'BHmwXexj07aPhov43-UrKLuYQ0oEEgIEpTmbR62Cg-WUp255LjWoo28j94VQuWY9LzgcKIn_Y27-BN_cA7f3XMg';

          // 宛先情報（Subscription）を発行する
          const sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
          });

          statusDiv.innerHTML = '宛先生成成功！Vercelサーバーに登録しています...';

          // VercelのAPI（サーバー）に宛先を送りつける
          const response = await fetch('/api/send-push', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ subscription: sub, registerOnly: true })
          });

          if (!response.ok) {
            const errText = await response.text();
            throw new Error(`サーバー登録エラー (Status: ${response.status}): ${errText}`);
          }

          const resData = await response.json();
          statusDiv.innerHTML = `<b style="color: green;">登録完了！</b><br>サーバーからの返事: ${resData.message}`;

        } else {
          statusDiv.innerHTML = '<span style="color: orange;">通知が拒否されました。設定アプリから通知を許可してください。</span>';
        }
      } catch (err) {
        // 💥 万が一エラーが起きたら、詳細原因を画面にドカンと赤文字で表示する
        statusDiv.innerHTML = `
          <span style="color: red; font-weight: bold;">【エラーが発生しました】</span><br>
          <span style="color: red; font-size: 13px;">
            <b>理由:</b> ${err.message || err.toString()}<br><br>
            <b>詳細コード:</b><br>${err.stack ? err.stack.replace(/\n/g, '<br>') : 'スタック情報なし'}
          </span>
        `;
        console.error(err);
      }
    });

    // 💡 VAPIDの鍵をブラウザが読める形式に変換するおまじない（必須関数）
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }
  </script>
</body>
</html>
